{% extends 'base/main.html' %}
{% block content %}

<div class="container-fluid px-4 d-flex flex-column" style="height: 80vh;">
    <h4 class="mt-4">SKU View</h4>
    <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item"><a href="">Home</a></li>
        <li class="breadcrumb-item active">SKU</li>
    </ol>

    <div class="card flex-fill mb-4 d-flex flex-column justify-content-center">
        <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div class="d-flex align-items-center">
                <i class="fas fa-table me-2"></i> <span>SKU List</span>
            </div>

            <div class="d-flex align-items-center">
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" id="cameraModeSwitch">
                    <label class="form-check-label ms-2" for="cameraModeSwitch" id="cameraModeLabel">Forward</label>
                </div>
            </div>

            <div class="d-none d-md-flex gap-2 align-items-center">
                {% if request.user.is_staff or request.user.is_superuser or user.profile.user_role == 2 %}
                <a href="{% url 'add_sku' %}" class="btn btn-primary">Add SKU</a>
                <a href="" class="btn btn-warning">Export SKU</a>
                {% endif %}
            </div>
        </div>

        <div class="card-body d-flex flex-column justify-content-center align-items-center text-center" style="flex-grow: 1;">
            <div class="position-relative w-100 mb-3 text-center">
                <video id="video" class="w-100" style="max-width: 800px; height: auto;" autoplay muted playsinline></video>
                <div id="recordingIndicator" class="position-absolute top-0 start-50 translate-middle-x mt-3 d-none" style="z-index: 10;">
                    <span class="badge bg-danger rounded-pill px-3 py-2">
                        <span class="me-2 blink-dot"></span>Recording...
                    </span>
                </div>
            </div>

            <div class="d-flex flex-wrap justify-content-center align-items-center gap-3 w-100">
                <input class="form-control" type="text" id="trackingId" placeholder="Scan or enter tracking ID" style="max-width: 200px;" />
                <input type="hidden" id="skuId" value="1" />
                <button class="btn btn-primary" id="recordBtn" disabled>Start Recording</button>
            </div>
        </div>
    </div>
</div>

<style>
    .blink-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        background-color: #fff;
        border-radius: 50%;
        animation: blink 1s infinite;
    }
    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }
</style>

<audio id="startBeep" preload="auto">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>
<audio id="stopBeep" preload="auto">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
    const video = document.getElementById('video');
    const recordBtn = document.getElementById('recordBtn');
    const cameraSwitch = document.getElementById('cameraModeSwitch');
    const cameraModeLabel = document.getElementById('cameraModeLabel');
    const recordingIndicator = document.getElementById('recordingIndicator');
    const trackingInput = document.getElementById('trackingId');
    const skuId = document.getElementById('skuId').value;
    const startBeep = document.getElementById('startBeep');
    const stopBeep = document.getElementById('stopBeep');

    let mediaRecorder, recordedBlobs = [], isRecording = false;
    let currentStream;
    let cameraMode = 'user';

    async function startCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: cameraMode },
                audio: true
            });
            currentStream = stream;
            video.srcObject = stream;
        } catch (err) {
            alert('Could not access the camera. Check permissions.');
            console.error(err);
        }
    }

    cameraSwitch.addEventListener('change', () => {
        cameraMode = cameraSwitch.checked ? 'environment' : 'user';
        cameraModeLabel.textContent = cameraSwitch.checked ? 'Reverse' : 'Forward';
        startCamera();
    });

    trackingInput.addEventListener('input', () => {
        recordBtn.disabled = trackingInput.value.trim() === '';
    });

    // ✅ Pressing Enter triggers recording or stops it
    trackingInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            event.preventDefault();
            trackingInput.blur(); // Avoids multiple triggers by barcode scanners
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
    });

    recordBtn.addEventListener('click', () => {
        isRecording ? stopRecording() : startRecording();
    });

    function startRecording() {
        if (!trackingInput.value.trim()) {
            alert('Tracking ID required.');
            return;
        }

        recordedBlobs = [];
        const options = { mimeType: 'video/webm;codecs=vp9' };
        try {
            mediaRecorder = new MediaRecorder(currentStream, options);
        } catch (e) {
            alert('MediaRecorder not supported.');
            console.error(e);
            return;
        }

        mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
                recordedBlobs.push(event.data);
            }
        };

        mediaRecorder.onstop = uploadVideo;

        mediaRecorder.start();
        isRecording = true;

        startBeep.play();
        recordingIndicator.classList.remove('d-none');
        recordBtn.textContent = 'Stop Recording';
        recordBtn.classList.replace('btn-primary', 'btn-danger');
    }

    function stopRecording() {
        mediaRecorder.stop();
        isRecording = false;

        stopBeep.play();
        recordingIndicator.classList.add('d-none');
        recordBtn.textContent = 'Start Recording';
        recordBtn.classList.replace('btn-danger', 'btn-primary');
    }

    function uploadVideo() {
        const blob = new Blob(recordedBlobs, { type: 'video/webm' });
        const formData = new FormData();
        const trackingId = trackingInput.value.trim();
        const transactionType = cameraSwitch.checked ? 'Reverse' : 'Forward';
        const filename = `${trackingId}.webm`;

        formData.append('tracking_id', trackingId);
        formData.append('sku_id', skuId);
        formData.append('transaction_type', transactionType);
        formData.append('video_file', blob, filename);

        fetch('/save_video/', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            alert(`Video saved for Tracking ID: ${trackingId} (${transactionType})`);
            trackingInput.value = '';
            recordBtn.disabled = true;
            trackingInput.focus();
        })
        .catch(err => {
            alert('Video upload failed.');
            console.error(err);
        });
    }

    // 🚀 On page load
    window.addEventListener('DOMContentLoaded', () => {
        trackingInput.focus();
        startCamera();
    });
</script>

{% endblock content %}
