{% extends 'base/main.html' %}
{% block content %}
<style>
    .custom-card-header {
    height: 55px; /* Adjust the height as needed */
    display: flex; /* Use flexbox for alignment */
    align-items: center; /* Center content vertically */
}
</style>

<div class="container-fluid px-4">
    <h4 class="mt-4">Gender</h4>
    <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item"><a href="">Home</a></li>
        <li class="breadcrumb-item active">Gender</li>
    </ol>
    
    <div class="card mb-4">
        <div class="card-header custom-card-header">
            <i class="fas fa-table me-1"></i>
            Add Gender
        </div>
        <form action="{% if gender %}/change_gender/{{gender.id}}/{% else %}/add_gender/{% endif %}" method="post">
            {% csrf_token %}
            <div class="card-body">
                <div class="card-body">
                    <div class="row">
                        <div class="col-xl-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="name" id="inputGender" type="text" placeholder="Gender Name" value="{{gender.name}}"  required/>
                                <label for="inputGender">Gender Name</label>
                            </div>
                        </div>
                        <div class="col-xl-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="abb" id="inputabb" type="text" placeholder="Gender Abb" value="{{gender.abb}}" oninput="this.value = this.value.toUpperCase()"  required/>
                                <label for="inputabb">Gender Abb</label>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-xl-12 col-md-12 d-flex justify-content-center">
                            <button class="btn btn-primary mx-2"> {% if gender %} Update Gender{% else %} Add Gender {% endif %}</button>
                            <button class="btn btn-secondary mx-2" type="reset">Reset</button>
                            <a class="btn btn-secondary mx-2" href="{% url 'view_gender' %}">Back</a>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock content %}
