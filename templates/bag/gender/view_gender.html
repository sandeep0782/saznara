{% extends 'base/main.html' %}
{% block content %}

<div class="container-fluid px-4">
    <h4 class="mt-4">Gender View</h4>
    <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item"><a href="">Home</a></li>
        <li class="breadcrumb-item active">Gender</li>
    </ol>
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <div>
                <i class="fas fa-table me-1"></i>
                Gender List
            </div>
            <div>
                <form method="GET" class="d-flex align-items-center gap-2" role="search">
                    <input class="form-control me-2" type="search" name="search" value="{{ search_query }}"
                        placeholder="Search by SKU or Name" aria-label="Search">
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
            <a href="{% url 'add_gender' %}" class="btn btn-primary">Add Gender</a>
        </div>
        <div class="card-body">
            <table id="datatablesSimple" class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Name</th>
                        <th>Abb</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in gender %}
                    <tr>
                        <td>{{ forloop.counter }}</td>
                        <td>{{ i.name }}</td>
                        <td>{{ i.abb }}</td>
                        <td>
                            <a class="btn btn-primary" href="{% url 'change_gender' i.id %}" aria-label="Edit Gender">
                                <i class="fas fa-edit"></i>
                            </a>
                        </td>
                        <td>
                            <a class="btn btn-danger" href="{% url 'delete_gender' i.id %}" aria-label="Delete Gender">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock content %}
