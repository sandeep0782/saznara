{% extends 'base/main.html' %}
{% block content %}
<style>
    .custom-card-header {
    height: 55px; /* Adjust the height as needed */
    display: flex; /* Use flexbox for alignment */
    align-items: center; /* Center content vertically */
}
</style>

<div class="container-fluid px-4">
    <h4 class="mt-4">Change Size</h4>
    <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item"><a href="">Home</a></li>
        <li class="breadcrumb-item active">Change Size</li>
    </ol>
    
    <div class="card mb-4">
        <div class="card-header custom-card-header">
            <i class="fas fa-table me-1"></i>
            Add Change Size
        </div>
        <form action="{% if size %}/change_size/{{size.id}}/{% else %}/add_size/{% endif %}" method="post">
            {% csrf_token %}
            <div class="card-body">
                <div class="card-body">
                    <div class="row">
                        <div class="col-xl-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="size" id="inputSeason" type="text" placeholder="Size" value="{{size.size}}" required/>
                                <label for="inputSeason">Size</label>
                            </div>
                        </div>
                        <div class="col-xl-6 col-md-6">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="abb" id="inputabb" type="text" placeholder="Size Abb" value="{{size.abb}}" oninput="this.value = this.value.toUpperCase()" required/>
                                <label for="inputabb">Size Abb</label>
                            </div>
                        </div>
                        
                    </div>
                    <div class="row">
                        <div class="col-xl-12 col-md-12 d-flex justify-content-center">
                            <button class="btn btn-primary mx-2"> {% if size %} Update Size {% else %} Add Size {% endif %}</button>
                            <button class="btn btn-secondary mx-2" type="reset">Reset</button>
                            <a class="btn btn-secondary mx-2" href="">Back</a>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock content %}
