{% load static %}

<nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
    <!-- Logo -->
    <a class="navbar-brand ps-3 d-flex align-items-center" href="/">
        <img src="{% static 'images/oct.png' %}" alt="Saznara" style="height: 45px; width: auto" />
        <span>Octo</span>
    </a>

    <!-- Sidebar Toggle -->
    <button class="btn btn-link btn-sm order-1 order-lg-0 me-3" id="sidebarToggle">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Push everything else to the right -->
    <div class="ms-auto d-flex align-items-center">
        <!-- Search -->
        <form class="d-none d-md-inline-block me-3">
            <div class="input-group">
                <input class="form-control" type="text" placeholder="Search..." aria-label="Search" />
                <button class="btn btn-primary" type="button">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </form>

        <!-- User -->
        {% if request.user.is_authenticated %}
        <ul class="navbar-nav">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown"
                    aria-expanded="false">
                    <i class="fas fa-user fa-fw"></i>
                </a>

                <ul class="dropdown-menu dropdown-menu-end">
                    {% if request.user.profile %}
                    <li>
                        <a class="dropdown-item" href="{% url 'user-profile' request.user.profile.id %}">
                            Profile
                        </a>
                    </li>

                    {% else %}

                    {% endif %}

                    <li>
                        <a class="dropdown-item" href="#!"> Settings </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="#!"> Activity Log </a>
                    </li>

                    <li>
                        <hr class="dropdown-divider" />
                    </li>

                    <li>
                        <a class="dropdown-item" href="{% url 'logout' %}"> Logout </a>
                    </li>
                </ul>
            </li>
        </ul>
        {% endif %}
    </div>
</nav>
