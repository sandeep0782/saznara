{% extends 'base/main.html' %}
{% block content %}
<style>
    .custom-card-header {
    height: 55px; /* Adjust the height as needed */
    display: flex; /* Use flexbox for alignment */
    align-items: center; /* Center content vertically */
}
</style>

<div class="container-fluid px-4">
    <h4 class="mt-4">Sku</h4>
    <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item"><a href="">Home</a></li>
        <li class="breadcrumb-item active">Sku</li>
    </ol>
    
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <div>
                <i class="fas fa-table me-1"></i>
                {% if sku %} Update SKU {% else %} Add SKU {% endif %}
            </div>
            <div class="d-flex justify-content-end gap-2">
                <a href="" class="btn btn-primary">Import</a>
                <!-- <a href="/static/main/template/Import_sku.csv" class="btn btn-warning">Template</a> -->
                <a href="" class="btn btn-warning">Template</a>

            </div>
        </div>
        
        <form action="{% if sku %}/change_sku/{{sku.id}}/{% else %}/add_sku/{% endif %}" method="post">
            {% csrf_token %}
            <div class="card-body">
                <div class="card-body">
                    <div class="row">
                        
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <select class="form-control" name="brand" id="inputSeason" required>
                                    <option value="" disabled selected>Select Brand</option>    
                                    {% for i in brand %}
                                    <option value="{{i.id}}" {% if sku.brand.id == i.id %}selected{% endif %}>{{i.name}}-{{i.abb}}</option>
                                    {% endfor %}                                    <!-- Add more options as needed -->
                                </select>
                                <label for="inputabb">Brand</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <select class="form-control" name="gender" id="inputSeason" required>
                                    <option value="" disabled selected>Select gender</option>
                                    {% for i in gender %}
                                    <option value="{{i.id}}" {% if sku.gender.id == i.id %}selected{% endif %}>{{i.name}}-{{i.abb}}</option>
                                    {% endfor %}
                                </select>
                                <label for="inputSku">Gender</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <select class="form-control" name="article_type" id="inputSeason" required>
                                    <option value="" disabled selected>Select Article Type</option>
                                    {% for i in article_type %}
                                    <option value="{{i.id}}" {% if sku.article_type.id == i.id %}selected{% endif %}>{{i.name}}-{{i.abb}}</option>
                                    {% endfor %}                                    <!-- Add more options as needed -->
                                </select>
                                <label for="inputabb">Article Type</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <select class="form-control" name="vendor" id="inputSeason" required>
                                    <option value="" disabled selected>Select Vendor</option>
                                    {% for i in vendor %}
                                    <option value="{{i.id}}" {% if sku.vendor.id == i.id %}selected{% endif %}>{{i.company}}</option>
                                    {% endfor %}                                    <!-- Add more options as needed -->
                                </select>
                                <label for="inputabb">Vendor Name</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="style_no" id="inputSku" type="text" placeholder="Style No" value="{{sku.style_no}}" required/>
                                <label for="inputSku">Style No</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="style_description" id="inputSku" type="text" placeholder="Style Description" value="{{sku.style_description}}" required/>
                                <label for="inputSku">Style Description</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="style_id" id="inputabb" type="text" placeholder="Sku Abb" value="{{sku.style_id}}"  required/>
                                <label for="inputabb">Style Id</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="ref_no" id="ref_no" type="text" placeholder="Sku Abb" value="{{sku.ref_no}}"  required/>
                                <label for="inputabb">Vendor Reference No</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <select class="form-control" name="size" id="inputSeason" required>
                                    <option value="" disabled selected>Select Size</option>
                                    {% for i in size %}
                                    <option value="{{i.id}}" {% if sku.size.id == i.id %}selected{% endif %}>{{i.size}}-{{i.abb}}</option>
                                    {% endfor %}                                    <!-- Add more options as needed -->
                                </select>
                                <label for="inputSku">Size</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <select class="form-control" name="color" id="inputSeason" required>
                                    <option value="" disabled selected>Select Color</option>
                                    {% for i in color %}
                                    <option value="{{i.id}}" {% if sku.color.id == i.id %}selected{% endif %}>{{i.color}}-{{i.abb}}</option>
                                    {% endfor %}                                    <!-- Add more options as needed -->
                                </select>
                                <label for="inputabb">Color</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="purchase_price" id="inputPur_price" type="number" placeholder="Purchase Price" value="{{sku.purchase_price}}" required/>
                                <label for="inputPur_price">Purchase Price</label>
                            </div>
                        </div>
                    

                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="mrp" id="inputMrp" type="number" placeholder="Mrp" value="{{sku.mrp}}" required/>
                                <label for="inputMrp">Mrp</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="chest_size" id="inputMrp" type="text" placeholder="Chest Size" value="{{sku.chest_size}}" required/>
                                <label for="inputMrp">Chest Size</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="sleeve_size" id="inputMrp" type="text" placeholder="Sleeve Size" value="{{sku.sleeve_size}}" required/>
                                <label for="inputMrp">Sleeve Size</label>
                            </div>
                        </div>
                        
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="product_image_link" id="inputabb" type="text" placeholder="Image Url" value="{{sku.product_image_link}}"  required/>
                                <label for="inputabb">Image Url</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="opening_stock" id="inputabb" type="number" placeholder="Openeing Stock" value="{{sku.opening_stock}}"  required/>
                                <label for="inputabb">Openeing Stock</label>
                            </div>
                        </div>
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="sku" id="inputSku" type="text" placeholder="Sku" value="{{sku.sku}}" disabled/>
                                <label for="inputSku">SKU</label>
                            </div>
                        </div>

                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="van" id="inputMrp" type="text" placeholder="Van" value="{{sku.van}}" disabled/>
                                <label for="inputMrp">Van</label>
                            </div>
                        </div>
                        
                        <div class="col-xl-4 col-md-4">
                            <div class="form-floating mb-3">
                                <input class="form-control" name="ean" id="inputabb" type="text" placeholder="Ean" value="{{sku.ean}}" disabled/>
                                <label for="inputabb">Ean</label>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-xl-12 col-md-12 d-flex justify-content-center">
                            <button class="btn btn-primary mx-2"> {% if sku %} Update Sku{% else %} Add Sku {% endif %}</button>
                            <button class="btn btn-secondary mx-2">Reset</button>
                            <a class="btn btn-secondary mx-2" href="{% url 'view_sku' %}">Back</a>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock content %}
